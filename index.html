<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wumpus Logic Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ff;
  --surface:#ffffff;
  --surface2:#f0edff;
  --surface3:#e8e3ff;
  --border:rgba(99,79,210,0.12);
  --border2:rgba(99,79,210,0.25);
  --purple:#6340e0;--purple2:#7c5ce8;--purple3:#9b81f5;--purple4:#c5b8ff;--purple5:#ede9ff;
  --teal:#00b894;--teal2:#00cba3;--teal3:#a8f4e0;--teal4:#d6fdf3;
  --coral:#ff5757;--coral2:#ff7a7a;--coral3:#ffd6d6;
  --amber:#f59e0b;--amber2:#fbbf24;--amber3:#fde68a;--amber4:#fffbeb;
  --blue:#0ea5e9;--blue2:#38bdf8;--blue3:#bae6fd;--blue4:#f0f9ff;
  --text:#1a1035;--text2:#4b3d7a;--text3:#8677b8;--text4:#b8aee0;
  --mono:'IBM Plex Mono',monospace;--sans:'Space Grotesk',sans-serif;
  --cell:68px;
  --shadow:0 2px 12px rgba(99,79,210,0.10),0 1px 3px rgba(99,79,210,0.07);
  --shadow-lg:0 8px 32px rgba(99,79,210,0.14),0 2px 8px rgba(99,79,210,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(99,79,210,0.065) 1px,transparent 1px);
  background-size:28px 28px;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 55% 40% at 0% 0%,rgba(99,64,224,0.09) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 100% 100%,rgba(0,184,148,0.08) 0%,transparent 70%);}
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:1.75rem 1.5rem}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
  margin-bottom:1.5rem;background:var(--surface);border:1.5px solid var(--border2);
  border-radius:20px;padding:1.1rem 1.5rem;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--purple3));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text h1{font-size:1.35rem;font-weight:800;color:var(--text);letter-spacing:-0.03em;line-height:1}
.logo-text p{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.07em;margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:100px;
  font-size:11.5px;font-family:var(--mono);font-weight:500;transition:all .3s;
  border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--text4);transition:all .3s;flex-shrink:0}
.badge.running .badge-dot{background:var(--teal);box-shadow:0 0 0 3px rgba(0,184,148,0.2);animation:ping 1.5s infinite}
.badge.running{border-color:rgba(0,184,148,.35);background:var(--teal4);color:#065f46}
.badge.gameover .badge-dot{background:var(--coral)}
.badge.gameover{border-color:rgba(255,87,87,.3);background:var(--coral3);color:#9f1239}
.badge.win .badge-dot{background:var(--blue);box-shadow:0 0 0 3px rgba(14,165,233,.2);animation:ping 1.5s infinite}
.badge.win{border-color:rgba(14,165,233,.3);background:var(--blue4);color:#0c4a6e}
.badge.stopped .badge-dot{background:var(--amber)}
.badge.stopped{border-color:rgba(245,158,11,.3);background:var(--amber4);color:#92400e}
@keyframes ping{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:1.25rem;
  padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow);}
.field{display:flex;align-items:center;gap:7px}
.field label{font-size:10.5px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.field input{width:52px;padding:6px 10px;background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:9px;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:600;
  outline:none;transition:border-color .2s;-moz-appearance:textfield;}
.field input:focus{border-color:var(--purple)}
.sep{width:1px;height:24px;background:var(--border2);flex-shrink:0}
button{padding:7px 18px;border-radius:10px;border:1.5px solid var(--border2);
  background:var(--surface2);color:var(--text2);font-family:var(--sans);font-size:13px;
  font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;letter-spacing:-.01em;}
button:hover{background:var(--surface3);border-color:var(--purple2);color:var(--purple)}
button:active{transform:scale(.97)}
.btn-new{background:linear-gradient(135deg,var(--purple),var(--purple2));border-color:var(--purple);
  color:#fff;box-shadow:0 2px 8px rgba(99,79,210,.30);}
.btn-new:hover{background:linear-gradient(135deg,var(--purple2),var(--purple3))!important;
  color:#fff!important;border-color:var(--purple2)!important;box-shadow:0 4px 14px rgba(99,79,210,.35)}
.btn-auto{background:var(--teal4);border-color:rgba(0,184,148,.35);color:#065f46}
.btn-auto:hover{background:rgba(0,184,148,.18)!important;border-color:var(--teal)!important;color:var(--teal)!important}
.btn-auto.active{background:var(--coral3);border-color:rgba(255,87,87,.3);color:#9f1239}
.btn-auto.active:hover{background:rgba(255,87,87,.18)!important;border-color:var(--coral)!important;color:var(--coral)!important}
.speed-group{display:flex;align-items:center;gap:7px}
.speed-group label{font-size:10.5px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.speed-group select{padding:6px 9px;background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:9px;color:var(--text2);font-family:var(--mono);font-size:11px;font-weight:600;outline:none;cursor:pointer;}
.layout{display:grid;grid-template-columns:1fr 370px;gap:1.25rem;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr}}
.grid-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:1.35rem;box-shadow:var(--shadow);}
.panel-hd{font-size:10.5px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;
  letter-spacing:.12em;font-weight:600;margin-bottom:1.1rem;display:flex;align-items:center;gap:8px;}
.panel-hd::after{content:'';flex:1;height:1.5px;background:var(--border);border-radius:2px}
#grid-wrap{display:flex;justify-content:center;overflow-x:auto;padding:4px}
#grid{display:grid;gap:5px}
.cell{width:var(--cell);height:var(--cell);border-radius:13px;border:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;transition:all .25s cubic-bezier(.4,0,.2,1);overflow:hidden;
  cursor:default;background:var(--surface2);}
.cell-coord{position:absolute;top:4px;right:5px;font-size:8px;font-family:var(--mono);color:var(--text4);font-weight:500}
.cell-percept{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:8px;
  font-family:var(--mono);letter-spacing:.04em;display:flex;justify-content:center;gap:3px;}
.c-unknown{background:var(--surface2);border-color:var(--border)}
.c-safe{background:linear-gradient(135deg,rgba(0,184,148,.10),rgba(0,184,148,.05));border-color:rgba(0,184,148,.35)}
.c-agent{background:linear-gradient(135deg,rgba(99,64,224,.18),rgba(124,92,232,.10));
  border-color:var(--purple2);box-shadow:0 0 0 3px rgba(99,64,224,.12),var(--shadow);}
.c-visited{background:rgba(0,184,148,.06);border-color:rgba(0,184,148,.2)}
.c-pit{background:linear-gradient(135deg,rgba(255,87,87,.12),rgba(255,87,87,.06));border-color:rgba(255,87,87,.4)}
.c-wumpus{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.06));border-color:rgba(245,158,11,.45)}
.c-frontier{background:linear-gradient(135deg,rgba(14,165,233,.09),rgba(14,165,233,.04));border-color:rgba(14,165,233,.3)}
.icon-agent{width:20px;height:20px;background:linear-gradient(135deg,var(--purple),var(--purple3));
  clip-path:polygon(50% 0%,0% 100%,100% 100%);animation:bob 2s ease-in-out infinite;margin-bottom:2px;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.icon-pit{width:20px;height:20px;border-radius:50%;background:rgba(255,87,87,.22);border:2px solid rgba(255,87,87,.65);box-shadow:0 0 0 3px rgba(255,87,87,.1)}
.icon-wumpus{width:15px;height:15px;background:rgba(245,158,11,.35);border:2px solid rgba(245,158,11,.7);transform:rotate(45deg);border-radius:3px}
.icon-gold{width:13px;height:13px;background:linear-gradient(135deg,var(--amber),var(--amber2));transform:rotate(45deg);border-radius:3px;box-shadow:0 0 8px rgba(245,158,11,.5),0 0 0 3px rgba(245,158,11,.15)}
.icon-dot{width:7px;height:7px;border-radius:50%;background:rgba(0,184,148,.5);border:1px solid var(--teal2)}
.cell-lbl{font-size:7.5px;font-family:var(--mono);font-weight:600;color:var(--text3);margin-top:3px;letter-spacing:.05em;text-transform:uppercase}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:1.1rem;padding-top:1.1rem;border-top:1.5px solid var(--border)}
.leg{display:flex;align-items:center;gap:5px;font-size:10.5px;font-family:var(--mono);color:var(--text3);font-weight:500}
.leg-box{width:12px;height:12px;border-radius:4px;border:1.5px solid transparent;flex-shrink:0}
.right{display:flex;flex-direction:column;gap:10px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);transition:transform .2s}
.metric:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.m-lbl{font-size:9.5px;font-family:var(--mono);font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.m-val{font-size:26px;font-weight:800;color:var(--text);line-height:1;transition:color .3s;letter-spacing:-0.03em}
.mv-purple{color:var(--purple)}.mv-teal{color:var(--teal)}.mv-blue{color:var(--blue)}.mv-amber{color:var(--amber)}
.score-pos{color:var(--teal)!important}.score-neg{color:var(--coral)!important}
.percept-box{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;grid-column:span 2;box-shadow:var(--shadow)}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;min-height:26px}
.tag{padding:3px 11px;border-radius:100px;font-size:10.5px;font-family:var(--mono);font-weight:700;letter-spacing:.04em}
.tag-breeze{background:var(--blue4);color:#0369a1;border:1.5px solid rgba(14,165,233,.3)}
.tag-stench{background:var(--amber4);color:#92400e;border:1.5px solid rgba(245,158,11,.35)}
.tag-glitter{background:var(--teal4);color:#065f46;border:1.5px solid rgba(0,184,148,.35)}
.tag-clear{background:var(--surface2);color:var(--text3);border:1.5px solid var(--border)}
.log-box,.kb-box{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow)}
#log{height:162px;overflow-y:auto;font-family:var(--mono);font-size:10.5px;line-height:1.9;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.le{padding:1.5px 0;border-bottom:1px solid rgba(99,79,210,.06);color:var(--text3);display:flex;gap:6px;align-items:baseline}
.le::before{content:'›';flex-shrink:0;color:var(--text4)}
.le-safe{color:#047857}.le-safe::before{color:rgba(0,184,148,.5)}
.le-danger{color:#be185d}.le-danger::before{color:rgba(255,87,87,.5)}
.le-move{color:var(--purple2)}.le-move::before{color:var(--purple3)}
.le-info{color:#0369a1}.le-info::before{color:rgba(14,165,233,.5)}
.le-warn{color:#92400e}.le-warn::before{color:rgba(245,158,11,.5)}
#kb{height:130px;overflow-y:auto;font-family:var(--mono);font-size:10px;line-height:1.9;color:var(--text3);scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.kb-e{border-bottom:1px solid rgba(99,79,210,.06);padding:1.5px 0}
.kb-safe{color:#047857}.kb-danger{color:#9f1239}.kb-fact{color:var(--purple2)}
#overlay{display:none;position:fixed;inset:0;background:rgba(245,243,255,0.85);
  backdrop-filter:blur(14px);z-index:200;align-items:center;justify-content:center}
#overlay.show{display:flex}
.ov-card{background:var(--surface);border:2px solid var(--border2);border-radius:24px;
  padding:2.5rem 2.5rem;text-align:center;max-width:340px;width:90%;
  box-shadow:0 24px 64px rgba(99,79,210,.18),0 4px 16px rgba(99,79,210,.12);
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.75) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.ov-icon{margin-bottom:1.2rem;display:flex;justify-content:center}
.ov-ring{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.ov-ring.win-ring{background:linear-gradient(135deg,rgba(0,184,148,.15),rgba(14,165,233,.15));border:2px solid rgba(0,184,148,.4)}
.ov-ring.lose-ring{background:linear-gradient(135deg,rgba(255,87,87,.12),rgba(245,158,11,.1));border:2px solid rgba(255,87,87,.3)}
.ov-title{font-size:1.9rem;font-weight:800;margin-bottom:8px;letter-spacing:-.04em;color:var(--text)}
.ov-sub{font-size:11.5px;color:var(--text3);font-family:var(--mono);margin-bottom:1.5rem;line-height:2;white-space:pre-line}
.btn-again{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--purple2));
  border:none;color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;
  transition:all .2s;letter-spacing:-.01em;box-shadow:0 4px 14px rgba(99,79,210,.35);}
.btn-again:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,79,210,.45)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>
      </div>
      <div class="logo-text">
        <h1>Wumpus Logic Agent</h1>
        <p>Propositional Logic · Resolution Refutation · KB Inference</p>
      </div>
    </div>
    <div class="badge" id="badge"><div class="badge-dot"></div><span id="badge-txt">Ready</span></div>
  </header>

  <div class="controls">
    <div class="field"><label>Rows</label><input type="number" id="iRows" value="4" min="3" max="8"></div>
    <div class="field"><label>Cols</label><input type="number" id="iCols" value="4" min="3" max="8"></div>
    <div class="sep"></div>
    <button class="btn-new" onclick="initGame()">⟳ New Game</button>
    <button onclick="agentStep()">Step →</button>
    <button class="btn-auto" id="btnAuto" onclick="toggleAuto()">▶ Auto Run</button>
    <div class="sep"></div>
    <div class="speed-group">
      <label>Speed</label>
      <select id="speedSel">
        <option value="900">Slow</option>
        <option value="450" selected>Normal</option>
        <option value="160">Fast</option>
        <option value="50">Turbo</option>
      </select>
    </div>
  </div>

  <div class="layout">
    <div class="grid-panel">
      <div class="panel-hd">World Grid</div>
      <div id="grid-wrap"><div id="grid"></div></div>
      <div class="legend">
        <div class="leg"><div class="leg-box" style="background:rgba(99,64,224,.18);border-color:rgba(99,64,224,.5)"></div>Agent</div>
        <div class="leg"><div class="leg-box" style="background:rgba(0,184,148,.10);border-color:rgba(0,184,148,.35)"></div>Safe</div>
        <div class="leg"><div class="leg-box" style="background:rgba(0,184,148,.06);border-color:rgba(0,184,148,.2)"></div>Visited</div>
        <div class="leg"><div class="leg-box" style="background:rgba(14,165,233,.09);border-color:rgba(14,165,233,.3)"></div>Frontier</div>
        <div class="leg"><div class="leg-box" style="background:var(--surface2);border-color:var(--border)"></div>Unknown</div>
        <div class="leg"><div class="leg-box" style="background:rgba(255,87,87,.12);border-color:rgba(255,87,87,.4)"></div>Pit</div>
        <div class="leg"><div class="leg-box" style="background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.45)"></div>Wumpus</div>
      </div>
    </div>

    <div class="right">
      <div class="metrics">
        <div class="metric"><div class="m-lbl">Inference Steps</div><div class="m-val mv-purple" id="mSteps">0</div></div>
        <div class="metric"><div class="m-lbl">Cells Visited</div><div class="m-val mv-teal" id="mVisited">0</div></div>
        <div class="metric"><div class="m-lbl">KB Clauses</div><div class="m-val mv-blue" id="mKB">0</div></div>
        <div class="metric"><div class="m-lbl">Score</div><div class="m-val" id="mScore">0</div></div>
        <div class="percept-box">
          <div class="m-lbl">Active Percepts — Current Cell</div>
          <div class="tags" id="tags"><span class="tag tag-clear">None</span></div>
        </div>
      </div>
      <div class="log-box">
        <div class="panel-hd">Inference Log</div>
        <div id="log"></div>
      </div>
      <div class="kb-box">
        <div class="panel-hd">Knowledge Base — CNF Clauses</div>
        <div id="kb"></div>
      </div>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="ov-card">
    <div class="ov-icon" id="ovIcon"></div>
    <div class="ov-title" id="ovTitle"></div>
    <div class="ov-sub" id="ovSub"></div>
    <button class="btn-again" onclick="initGame();closeOv()">Play Again</button>
  </div>
</div>

<script>
let ROWS=4,COLS=4,pits=[],wumpus=null,gold=null;
let agent={r:0,c:0};
let visited=new Set(),kbSafe=new Set(),kbDanger=new Map(),kbPercept=new Map(),kbClauses=[];
let inferenceSteps=0,score=0,autoTimer=null,gameOver=false;

const key=(r,c)=>r+','+c;
const unkey=k=>k.split(',').map(Number);
const inB=(r,c)=>r>=0&&r<ROWS&&c>=0&&c<COLS;
const nbrs=(r,c)=>[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([a,b])=>inB(a,b));
const hasPit=(r,c)=>pits.some(([a,b])=>a===r&&b===c);
const hasWumpus=(r,c)=>wumpus&&wumpus[0]===r&&wumpus[1]===c;
const hasGold=(r,c)=>gold&&gold[0]===r&&gold[1]===c;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}

function initGame(){
  stopAuto();
  ROWS=Math.max(3,Math.min(8,parseInt(document.getElementById('iRows').value)||4));
  COLS=Math.max(3,Math.min(8,parseInt(document.getElementById('iCols').value)||4));
  pits=[];wumpus=null;gold=null;
  visited=new Set();kbSafe=new Set();kbDanger=new Map();kbPercept=new Map();kbClauses=[];
  inferenceSteps=0;score=0;gameOver=false;
  ['mSteps','mVisited','mKB'].forEach(id=>document.getElementById(id).textContent='0');
  const sc=document.getElementById('mScore');sc.textContent='0';sc.className='m-val';
  document.getElementById('log').innerHTML='';
  document.getElementById('kb').innerHTML='';
  document.getElementById('tags').innerHTML='<span class="tag tag-clear">None</span>';
  setStatus('running','Running');
  agent={r:ROWS-1,c:0};
  let cells=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    if(!(r===ROWS-1&&c===0)) cells.push([r,c]);
  shuffle(cells);
  const np=Math.max(1,Math.floor(ROWS*COLS*0.15));
  for(let i=0;i<np&&i<cells.length;i++) pits.push(cells[i]);
  if(cells[np]) wumpus=cells[np];
  if(cells[np+1]) gold=cells[np+1];
  markSafe(agent.r,agent.c,'axiom — start cell');
  perceiveAndInfer();
  renderGrid();
  addLog('Grid '+ROWS+'×'+COLS+' ready. Agent at ('+agent.r+','+agent.c+').','le-info');
}

function perceiveAndInfer(){
  const r=agent.r,c=agent.c,k=key(r,c);
  visited.add(k);score-=1;
  const breeze=nbrs(r,c).some(([a,b])=>hasPit(a,b));
  const stench=nbrs(r,c).some(([a,b])=>hasWumpus(a,b));
  const glitter=hasGold(r,c);
  kbPercept.set(k,{breeze,stench,glitter});
  if(breeze){
    addClause('B_'+r+'_'+c+' ↔ ('+nbrs(r,c).map(([a,b])=>'P_'+a+'_'+b).join(' ∨ ')+')','kb-fact');
    addLog('Breeze at ('+r+','+c+') — pit is nearby','le-warn');
  }
  if(stench){
    addClause('S_'+r+'_'+c+' ↔ ('+nbrs(r,c).map(([a,b])=>'W_'+a+'_'+b).join(' ∨ ')+')','kb-fact');
    addLog('Stench at ('+r+','+c+') — wumpus is nearby','le-warn');
  }
  if(!breeze&&!stench) addClause('¬B ∧ ¬S at ('+r+','+c+') → all nbrs safe','kb-safe');
  const tags=[];
  if(breeze) tags.push('<span class="tag tag-breeze">Breeze</span>');
  if(stench) tags.push('<span class="tag tag-stench">Stench</span>');
  if(glitter) tags.push('<span class="tag tag-glitter">Glitter ✦</span>');
  document.getElementById('tags').innerHTML=tags.length?tags.join(''):'<span class="tag tag-clear">Clear</span>';
  runInference();updateMetrics();
}

function runInference(){
  let changed=true;
  while(changed){
    changed=false;
    for(const [k,perc] of kbPercept.entries()){
      const [r,c]=unkey(k);const ns=nbrs(r,c);
      if(!perc.breeze&&!perc.stench){
        for(const [nr,nc] of ns){
          if(markSafe(nr,nc,'Rule-1: no percept at ('+r+','+c+')')){changed=true;inferenceSteps++}
        }
      }
      if(perc.breeze){
        const unkn=ns.filter(([nr,nc])=>!kbSafe.has(key(nr,nc))&&!kbDanger.has(key(nr,nc)));
        if(unkn.length===1){const [nr,nc]=unkn[0];
          if(markDanger(nr,nc,'pit','Rule-2: only pit-candidate for B_('+r+','+c+')')){changed=true;inferenceSteps++}}
      }
      if(perc.stench){
        const unkn=ns.filter(([nr,nc])=>!kbSafe.has(key(nr,nc))&&!kbDanger.has(key(nr,nc)));
        if(unkn.length===1){const [nr,nc]=unkn[0];
          if(markDanger(nr,nc,'wumpus','Rule-3: only wumpus-candidate for S_('+r+','+c+')')){changed=true;inferenceSteps++}}
      }
    }
    for(const k of kbDanger.keys()){
      if(kbSafe.has(k)){kbDanger.delete(k);changed=true;
        addLog('Contradiction resolved: '+k+' → SAFE','le-safe');
        addClause('CONTRADICTION: '+k+' proved SAFE','kb-safe');inferenceSteps++;}
    }
  }
}

function markSafe(r,c,reason){
  const k=key(r,c);if(kbSafe.has(k)) return false;
  kbSafe.add(k);
  addClause('¬P_'+r+'_'+c+' ∧ ¬W_'+r+'_'+c+' ['+reason+']','kb-safe');
  addLog('Proved SAFE: ('+r+','+c+') — '+reason,'le-safe');return true;
}

function markDanger(r,c,type,reason){
  const k=key(r,c);if(kbDanger.has(k)||kbSafe.has(k)) return false;
  kbDanger.set(k,type);
  addClause((type==='pit'?'P':'W')+'_'+r+'_'+c+' ['+reason+']','kb-danger');
  addLog('Proved '+type.toUpperCase()+': ('+r+','+c+') — '+reason,'le-danger');return true;
}

function agentStep(){
  if(gameOver) return;
  if(hasPit(agent.r,agent.c)){endGame(false,'pit');return}
  if(hasWumpus(agent.r,agent.c)){endGame(false,'wumpus');return}
  if(hasGold(agent.r,agent.c)){endGame(true);return}
  const next=chooseNext();
  if(!next){
    addLog('No safe unvisited cells reachable. Exploration complete.','le-info');
    setStatus('stopped','Complete');stopAuto();return;
  }
  agent={r:next[0],c:next[1]};score-=1;
  addLog('→ Move to ('+next[0]+','+next[1]+')','le-move');
  perceiveAndInfer();renderGrid();
  if(hasPit(agent.r,agent.c)){endGame(false,'pit');return}
  if(hasWumpus(agent.r,agent.c)){endGame(false,'wumpus');return}
  if(hasGold(agent.r,agent.c)){endGame(true);return}
}

function chooseNext(){
  const adj=nbrs(agent.r,agent.c).filter(([r,c])=>kbSafe.has(key(r,c))&&!visited.has(key(r,c)));
  if(adj.length) return adj[0];
  const q=[[agent.r,agent.c]];const seen=new Set([key(agent.r,agent.c)]);
  while(q.length){
    const [r,c]=q.shift();
    for(const [nr,nc] of nbrs(r,c)){
      const nk=key(nr,nc);if(seen.has(nk)) continue;seen.add(nk);
      if(!kbSafe.has(nk)) continue;
      if(!visited.has(nk)) return [nr,nc];
      q.push([nr,nc]);
    }
  }
  return null;
}

function endGame(won,cause){
  gameOver=true;stopAuto();
  if(won) score+=1000;
  renderGrid();updateMetrics();
  setTimeout(()=>{
    if(won){
      document.getElementById('ovIcon').innerHTML='<div class="ov-ring win-ring"><div style="width:28px;height:28px;background:linear-gradient(135deg,#00b894,#0ea5e9);transform:rotate(45deg);border-radius:4px;box-shadow:0 0 16px rgba(0,184,148,.5)"></div></div>';
      document.getElementById('ovTitle').textContent='Gold Found!';
      document.getElementById('ovSub').textContent='Agent succeeded in '+visited.size+' moves.\n'+inferenceSteps+' resolution inferences.\nFinal score: '+score;
      setStatus('win','Agent Won');
    }else{
      document.getElementById('ovIcon').innerHTML='<div class="ov-ring lose-ring"><div style="width:20px;height:20px;background:linear-gradient(135deg,#ff5757,#f59e0b);border-radius:'+(cause==='pit'?'50%':'4px')+';box-shadow:0 0 16px rgba(255,87,87,.5)"></div></div>';
      document.getElementById('ovTitle').textContent=cause==='pit'?'Fell into a Pit!':'Eaten by Wumpus!';
      document.getElementById('ovSub').textContent='Agent terminated at ('+agent.r+','+agent.c+').\n'+inferenceSteps+' inferences made.\nFinal score: '+score;
      setStatus('gameover','Game Over');
    }
    document.getElementById('overlay').classList.add('show');
  },350);
}

function renderGrid(){
  const g=document.getElementById('grid');
  g.style.gridTemplateColumns='repeat('+COLS+',var(--cell))';
  g.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const div=document.createElement('div');div.className='cell';
    const k=key(r,c);
    const isAgent=agent.r===r&&agent.c===c;
    const isVisited=visited.has(k);const isSafe=kbSafe.has(k);
    const danger=kbDanger.get(k);const percept=kbPercept.get(k);
    const isFrontier=!isVisited&&!isAgent&&nbrs(r,c).some(([nr,nc])=>visited.has(key(nr,nc)));
    let cls,inner='';
    if(isAgent){
      cls='c-agent';
      inner='<div class="icon-agent"></div><div class="cell-lbl" style="color:var(--purple2)">agent</div>';
    }else if(danger==='pit'){
      cls='c-pit';
      inner='<div class="icon-pit"></div><div class="cell-lbl" style="color:rgba(255,87,87,.8)">pit</div>';
    }else if(danger==='wumpus'){
      cls='c-wumpus';
      inner='<div class="icon-wumpus"></div><div class="cell-lbl" style="color:rgba(245,158,11,.9);margin-top:8px">wumpus</div>';
    }else if(isVisited){
      cls='c-visited';
      if(hasGold(r,c)){
        inner='<div class="icon-gold"></div><div class="cell-lbl" style="color:var(--amber);margin-top:7px">gold</div>';
      }else{
        inner='<div class="icon-dot"></div>';
      }
      if(percept){
        const ps=[];
        if(percept.breeze) ps.push('<span style="color:var(--blue);font-size:8px;font-weight:700">B</span>');
        if(percept.stench) ps.push('<span style="color:var(--amber);font-size:8px;font-weight:700">S</span>');
        if(percept.glitter) ps.push('<span style="color:var(--teal);font-size:8px;font-weight:700">G</span>');
        if(ps.length) inner+='<div class="cell-percept">'+ps.join('')+'</div>';
      }
    }else if(isSafe){
      cls='c-safe';
      inner='<div style="width:9px;height:9px;border-radius:50%;background:rgba(0,184,148,.55);border:1.5px solid var(--teal2)"></div><div class="cell-lbl" style="color:var(--teal)">safe</div>';
    }else if(isFrontier){
      cls='c-frontier';
      inner='<div style="font-size:11px;font-family:var(--mono);color:rgba(14,165,233,.45);font-weight:700">?</div>';
    }else{
      cls='c-unknown';
      inner='<div style="font-size:11px;font-family:var(--mono);color:var(--text4);font-weight:500">?</div>';
    }
    div.classList.add(cls);
    div.innerHTML='<div class="cell-coord">'+r+','+c+'</div>'+inner;
    g.appendChild(div);
  }
}

function updateMetrics(){
  document.getElementById('mSteps').textContent=inferenceSteps;
  document.getElementById('mVisited').textContent=visited.size;
  document.getElementById('mKB').textContent=kbClauses.length;
  const sc=document.getElementById('mScore');
  sc.textContent=score;
  sc.className='m-val '+(score>=0?'score-pos':'score-neg');
}

function addLog(msg,cls){
  const el=document.getElementById('log');
  const d=document.createElement('div');d.className='le '+(cls||'');d.textContent=msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function addClause(clause,cls){
  kbClauses.push(clause);
  const el=document.getElementById('kb');
  const d=document.createElement('div');d.className='kb-e '+(cls||'');
  d.textContent=kbClauses.length+'. '+clause;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  document.getElementById('mKB').textContent=kbClauses.length;
}

function setStatus(type,text){
  document.getElementById('badge').className='badge '+type;
  document.getElementById('badge-txt').textContent=text;
}

function stopAuto(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null}
  const b=document.getElementById('btnAuto');b.textContent='▶ Auto Run';b.classList.remove('active');
}

function toggleAuto(){
  if(autoTimer){stopAuto();}else{
    const b=document.getElementById('btnAuto');b.textContent='■ Stop';b.classList.add('active');
    const spd=parseInt(document.getElementById('speedSel').value)||450;
    autoTimer=setInterval(agentStep,spd);
  }
}

function closeOv(){document.getElementById('overlay').classList.remove('show')}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeOv()});
initGame();
</script>
